services:
  # 1. Kiler (PostgreSQL Veritabanı)
  postgres-db:
    image: postgres:15
    container_name: midas_postgres
    environment:
      POSTGRES_USER: midas_user
      POSTGRES_PASSWORD: midas_password
      POSTGRES_DB: midas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Garsonun Not Defteri (Redis Cache & Pub/Sub)
  redis-cache:
    image: redis:7
    container_name: midas_redis
    ports:
      - "6379:6379"

  # 3. Aşçının Sipariş Rayı (Apache Kafka Orijinal İmajı)
  kafka-broker:
    image: apache/kafka:3.7.0
    container_name: midas_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"

volumes:
  postgres_data: